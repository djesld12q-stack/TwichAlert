<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwitchAlert Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06090f;
    --panel: #0a0f1a;
    --border: #162035;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --text: #dde6f0;
    --muted: #3d5470;
    --tab-h: 52px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  /* ── TOP NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: rgba(6,9,15,.98);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 0;
    z-index: 1000;
    padding: 0 20px;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-right: 24px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 900;
    background: linear-gradient(130deg, #60a5fa, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
    line-height: 1;
  }
  .logo-sub {
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 2px;
  }

  .divider-v {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin-right: 16px;
    flex-shrink: 0;
  }

  .tabs {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 100%;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 18px;
    height: 36px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    text-decoration: none;
    user-select: none;
  }
  .tab:hover {
    color: var(--text);
    background: rgba(59,130,246,.06);
    border-color: rgba(59,130,246,.15);
  }
  .tab.active {
    color: var(--accent);
    background: rgba(59,130,246,.1);
    border-color: rgba(59,130,246,.3);
    box-shadow: 0 0 16px rgba(59,130,246,.15);
  }
  .tab .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .tab.active .tab-dot {
    box-shadow: 0 0 6px currentColor;
    animation: dotpulse 2s ease-in-out infinite;
  }
  @keyframes dotpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  /* ── IFRAME PANELS ── */
  .panels {
    position: fixed;
    top: var(--tab-h);
    left: 0; right: 0; bottom: 0;
  }

  .panel {
    position: absolute;
    inset: 0;
    display: none;
  }
  .panel.active {
    display: block;
  }

  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: var(--bg);
  }

  /* ── LOADING OVERLAY ── */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    gap: 16px;
    z-index: 10;
    transition: opacity .3s;
  }
  .loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spin-ring {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
  }
</style>
</head>
<body>

<nav>
  <div class="logo-wrap">
    <div class="logo">TWITCHALERT</div>
    <div class="logo-sub">OVERLAY SYSTEM</div>
  </div>
  <div class="divider-v"></div>
  <div class="tabs">
    <button class="tab active" data-tab="settings" onclick="switchTab('settings', this)">
      <span class="tab-dot"></span>
      НАЛАШТУВАННЯ
    </button>
    <button class="tab" data-tab="alert" onclick="switchTab('alert', this)">
      <span class="tab-dot"></span>
      ALERT OVERLAY
    </button>
  </div>
</nav>

<div class="panels">

  <div class="panel active" id="panel-settings">
    <div class="loading" id="load-settings">
      <div class="spin-ring"></div>
      <div class="loading-txt">ЗАВАНТАЖЕННЯ...</div>
    </div>
    <iframe src="settings.html" id="iframe-settings" onload="onFrameLoad('settings')"></iframe>
  </div>

  <div class="panel" id="panel-alert">
    <div class="loading hidden" id="load-alert">
      <div class="spin-ring"></div>
      <div class="loading-txt">ЗАВАНТАЖЕННЯ...</div>
    </div>
    <iframe src="alert.html" id="iframe-alert" onload="onFrameLoad('alert')"></iframe>
  </div>

</div>

<script>
  const loaded = { settings: false, alert: false };

  function switchTab(name, btn) {
    // Update tab buttons
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    // Update panels
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + name);
    panel.classList.add('active');

    // Show loading if not yet loaded
    if (!loaded[name]) {
      document.getElementById('load-' + name).classList.remove('hidden');
    }
  }

  function onFrameLoad(name) {
    loaded[name] = true;
    const overlay = document.getElementById('load-' + name);
    if (overlay) overlay.classList.add('hidden');
  }
</script>

</body>
</html>
