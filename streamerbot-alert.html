<style>

  #wrap.ai-Donation{animation:aiDonation .65s ease forwards;}

  #wrap.ao-Follow{animation:aoFollow .5s cubic-bezier(0.55,0,0.85,.15) forwards;}
  @keyframes aiFollow{0%{opacity:0;transform:translateX(-120%) scale(.92)}55%{opacity:1;transform:translateX(2%) scale(1.02)}75%{transform:translateX(-1%)}100%{opacity:1;transform:translateX(0) scale(1)}}

  @keyframes aoRaid{0%{opacity:1;transform:translateY(0)}20%{transform:translateY(-3%)}100%{opacity:0;transform:translateY(130%)}}
  #wrap.ai-ReSub{animation:aiReSub .65s cubic-bezier(0.34,1.56,0.64,1) forwards;}

  @keyframes aiReSub{0%{opacity:0;transform:scale(.15);filter:blur(14px)}50%{opacity:1;transform:scale(1.06);filter:blur(0)}72%{transform:scale(.97)}100%{opacity:1;transform:scale(1);filter:none}}
  @keyframes aoReSub{0%{opacity:1;transform:scale(1);filter:none}30%{transform:scale(1.08)}100%{opacity:0;transform:scale(.05);filter:blur(14px)}}
  #wrap.ai-GiftSub{animation:aiGiftSub .65s cubic-bezier(0.22,1,0.36,1) forwards;}
  #wrap.ao-GiftSub{animation:aoGiftSub .5s ease-in forwards;}

  @keyframes aoGiftSub{0%{opacity:1;transform:perspective(900px) rotateY(0)}100%{opacity:0;transform:perspective(900px) rotateY(90deg) scale(.8)}}
  #wrap.ai-GiftBomb{animation:aiGiftBomb .65s cubic-bezier(0.22,1,0.36,1) forwards;}
  #wrap.ao-GiftBomb{animation:aoGiftBomb .5s ease-in forwards;}
  @keyframes aiGiftBomb{0%{opacity:0;transform:scale(.05) rotate(-8deg)}35%{opacity:1;transform:scale(1.12) rotate(3deg)}60%{transform:scale(.97) rotate(-1deg)}80%{transform:scale(1.03)}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes aoGiftBomb{0%{opacity:1;transform:scale(1)}25%{transform:scale(1.06)}100%{opacity:0;transform:scale(.05) rotate(5deg)}}
  #wrap.ai-WatchStreak{animation:aiWatchStreak .65s cubic-bezier(0.22,1,0.36,1) forwards;}
  #wrap.ao-WatchStreak{animation:aoWatchStreak .5s cubic-bezier(0.55,0,0.85,.15) forwards;}
  @keyframes aiWatchStreak{0%{opacity:0;transform:translateY(130%) scale(.88)}50%{opacity:1;transform:translateY(-3%) scale(1.03)}72%{transform:translateY(1.5%)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes aoWatchStreak{0%{opacity:1;transform:translateY(0)}20%{transform:translateY(3%)}100%{opacity:0;transform:translateY(-130%)}}
  #wrap.ai-BitsBadgeTier{animation:aiBitsBadgeTier .65s cubic-bezier(0.22,1,0.36,1) forwards;}
  #wrap.ao-BitsBadgeTier{animation:aoBitsBadgeTier .5s ease-in forwards;}
  @keyframes aiBitsBadgeTier{0%{opacity:0;transform:scaleX(.05) scaleY(2.5) translateX(-80%)}35%{opacity:1;transform:scaleX(1.3) scaleY(.7)}55%{transform:scaleX(.88) scaleY(1.15)}72%{transform:scaleX(1.05) scaleY(.95)}100%{opacity:1;transform:scale(1)}}
  @keyframes aoBitsBadgeTier{0%{opacity:1;filter:none}30%{filter:blur(2px)}100%{opacity:0;filter:blur(16px);transform:scale(1.1)}}
#frame{position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(8,16,45,0.95),rgba(5,25,60,0.95),rgba(8,12,38,0.95));border:1.5px solid rgba(100,180,255,.35);box-shadow:0 0 28px rgba(50,120,255,.3),inset 0 0 36px rgba(0,60,120,.2);overflow:hidden;transition:border-color .3s,box-shadow .3s;}
#frame::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 18% 55%,rgba(80,150,255,.14) 0%,transparent 58%);animation:shim 3s ease-in-out infinite alternate;}
@keyframes shim{from{opacity:.6}to{opacity:1}}
.c{position:absolute;width:18px;height:18px;border-style:solid;transition:border-color .3s;}
.tl{top:6px;left:6px;border-width:2px 0 0 2px}.tr{top:6px;right:6px;border-width:2px 2px 0 0}
.bl{bottom:6px;left:6px;border-width:0 0 2px 2px}.br{bottom:6px;right:6px;border-width:0 2px 2px 0}
#ptcl{position:absolute;inset:0;overflow:hidden;pointer-events:none;}

.p{position:absolute;bottom:0;width:4px;height:4px;border-radius:50%;animation:pup linear infinite;}
@keyframes pup{0%{transform:translateY(160px);opacity:0}20%{opacity:1}80%{opacity:.5}100%{transform:translateY(-16px) translateX(var(--d,0));opacity:0}}
.p-snow{position:absolute;top:-10px;border-radius:50%;animation:psnow linear infinite;}
@keyframes psnow{0%{transform:translateY(-10px) rotate(0);opacity:0}10%{opacity:.9}90%{opacity:.5}100%{transform:translateY(170px) translateX(var(--d,0px)) rotate(360deg);opacity:0}}
.p-ember{position:absolute;bottom:0;border-radius:2px;animation:pember linear infinite;}
@keyframes pember{0%{transform:translateY(0) scale(1) rotate(0);opacity:0}15%{opacity:1}85%{opacity:.6}100%{transform:translateY(-180px) translateX(var(--d,0)) scale(.2) rotate(720deg);opacity:0}}
.p-matrix{position:absolute;top:-20px;width:12px;font-size:10px;font-family:monospace;animation:pmatrix linear infinite;text-shadow:0 0 6px currentColor;}
@keyframes pmatrix{0%{transform:translateY(-20px);opacity:0}5%{opacity:.9}90%{opacity:.5}100%{transform:translateY(200px);opacity:0}}
.p-heart{position:absolute;bottom:0;font-size:12px;animation:pheart linear infinite;}
@keyframes pheart{0%{transform:translateY(0) scale(.5);opacity:0}15%{opacity:1;transform:translateY(-20px) scale(1)}90%{opacity:.4}100%{transform:translateY(-180px) translateX(var(--d,0)) scale(.3);opacity:0}}
.p-bolt{position:absolute;font-size:12px;animation:pbolt ease-in-out infinite;}
@keyframes pbolt{0%,100%{transform:translateX(var(--x,0)) translateY(0);opacity:.2}50%{opacity:1;transform:translateX(var(--x,0)) translateY(var(--dy,-8px));}}
.p-ring{position:absolute;bottom:0;border-radius:50%;border:1.5px solid;animation:pring linear infinite;background:transparent;}
@keyframes pring{0%{transform:translateY(0) scale(.5);opacity:0}15%{opacity:.9;transform:translateY(-15px) scale(1)}90%{opacity:0}100%{transform:translateY(-170px) translateX(var(--d,0)) scale(.3);opacity:0}}
.spark{position:absolute;width:7px;height:7px;z-index:10;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:spk 1.4s ease-out forwards;}
@keyframes spk{0%{transform:scale(0) rotate(0);opacity:1}50%{transform:scale(1.6) rotate(180deg);opacity:.9}100%{transform:scale(0) rotate(360deg) translate(var(--sx,0),var(--sy,-50px));opacity:0}}
.spark-coin{position:absolute;font-size:14px;z-index:10;animation:scoins 1.3s ease-out forwards;}
@keyframes scoins{0%{transform:scale(0) translateY(0);opacity:1}60%{opacity:1}100%{transform:scale(1) translate(var(--sx,0),var(--sy,-60px));opacity:0}}
.spark-conf{position:absolute;width:7px;height:5px;z-index:10;border-radius:1px;animation:sconf 1.5s ease-out forwards;}
@keyframes sconf{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1) rotate(var(--r,180deg)) translate(var(--sx,0),var(--sy,-60px));opacity:0}}
.spark-ring{position:absolute;border-radius:50%;border:2px solid;z-index:10;animation:sring .9s ease-out forwards;}
@keyframes sring{0%{transform:scale(0);opacity:1}100%{transform:scale(var(--rs,3));opacity:0}}
.spark-emoji{position:absolute;font-size:18px;z-index:10;animation:semoji 1.6s ease-out forwards;}
@keyframes semoji{0%{transform:scale(0);opacity:1}20%{transform:scale(1.2)}100%{transform:scale(.6) translate(var(--sx,0),var(--sy,-70px)) rotate(var(--r,30deg));opacity:0}}
#av{flex-shrink:0;margin-left:16px;z-index:2;}
#ring{width:100px;height:100px;border-radius:50%;padding:3px;animation:spin 3s linear infinite;display:flex;align-items:center;justify-content:center;}
@keyframes spin{to{transform:rotate(360deg)}}
#inner{width:94px;height:94px;border-radius:50%;background:#0a1030;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:38px;animation:spinr 3s linear infinite;}
@keyframes spinr{to{transform:rotate(-360deg)}}
#inner img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
#txt{flex:1;padding:0 20px 0 14px;z-index:2;}
#lbl{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:#96c8ff;margin-bottom:4px;}
#uname{font-family:'Cinzel Decorative',cursive;font-size:27px;font-weight:700;font-style:normal;letter-spacing:0px;line-height:1.1;margin-bottom:6px;animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45) drop-shadow(0 0 8px currentColor)}}
#msg{font-family:'Cinzel',serif;font-size:22px;font-weight:700;font-style:italic;letter-spacing:0px;color:#ffffff;line-height:1.4;text-shadow:0 0 12px rgba(255,255,255,.8),0 2px 4px rgba(0,0,0,.9);}
</style></head><body>
<div id="wrap">
  <div id="frame"><div class="c tl" id="c0"></div><div class="c tr" id="c1"></div><div class="c bl" id="c2"></div><div class="c br" id="c3"></div><div id="ptcl"></div></div>
  <div id="av"><div id="ring" style="background:conic-gradient(#4af,#a4f,#4ff,#4af)"><div id="inner">⭐</div></div></div>
  <div id="txt"><div id="lbl"></div><div id="uname"></div><div id="msg"></div></div>
</div>
<script>
const WS='ws://127.0.0.1:8080/',WS2='ws://127.0.0.1:8181/',ST=6000,HT=600,GT=400;
function xn(d){return d.user?.name||d.user?.login||d.userName||d.userLogin||d.user_name||d.displayName||d.login||d.name||null;}
const ac={};async function fav(l){if(!l)return null;l=l.toLowerCase();if(ac[l])return ac[l];try{const r=await fetch(`https://decapi.me/twitch/avatar/${l}`);if(r.ok){const u=(await r.text()).trim();if(u.startsWith('http')){ac[l]=u;return u;}}}catch{}return null;}async function rav(d){const fd=d.targetUserProfileImageUrl||d.user?.profileImageUrl||null;if(fd)return fd;const l=d.user_login||d.user_name||d.from_broadcaster_user_login||d.from_broadcaster_user_name||d.user?.login||d.userName||null;return await fav(l);}
const EV={
  Donation:{label:"💛 MONOBANK ДОНАТ 💛",emoji:"💛",color:"#FFD700",accent:"rgba(255,215,0,.7)",glow:"rgba(255,200,0,.5)",ring:"conic-gradient(#fd4,#FFD700,#ffa500,#fd4)",user:d=>'Любимий донатер!',msg:d=>{const amt=d.monoAmount||(d.amount?d.amount+' '+(d.currency||'грн'):'');const cmt=d.monoComment||d.comment||'';return ""+amt+" — "+(cmt?cmt:'');}},
  Follow:{label:"✦ НОВИЙ ФОЛОВЕР ✦",emoji:"💙",color:"#88ddff",accent:"rgba(100,200,255,.6)",glow:"rgba(50,180,255,.4)",ring:"conic-gradient(#4af,#88f,#4ff,#4af)",user:d=>d.user_name||d.user_login||xn(d)||'???',msg:()=>"Дякуємо за фолов! 💙"},
  Raid:{label:"⚔ РЕЙД ⚔",emoji:"⚔️",color:"#ff9966",accent:"rgba(255,120,80,.6)",glow:"rgba(255,100,60,.45)",ring:"conic-gradient(#f84,#f64,#f94,#f84)",user:d=>d.from_broadcaster_user_name||d.from_broadcaster_user_login||xn(d)||'???',msg:d=>"Рейд з "+(d.viewers??'?')+" глядачами! ⚔️"},
  ReSub:{label:"✦ РЕСАБ ✦",emoji:"💜",color:"#bb88ff",accent:"rgba(160,100,255,.6)",glow:"rgba(130,70,255,.4)",ring:"conic-gradient(#94f,#a4f,#b4f,#94f)",user:d=>xn(d)||'???',msg:d=>""+(d.cumulativeMonths??d.streakMonths??'?')+" місяців підписки! 💜"},
  GiftSub:{label:"✦ ПОДАРОВАНА ПІДПИСКА ✦",emoji:"🎀",color:"#ffaa44",accent:"rgba(255,160,50,.6)",glow:"rgba(255,140,30,.4)",ring:"conic-gradient(#fa4,#fc4,#f84,#fa4)",user:d=>xn(d)||'???',msg:d=>{const r=d.recipient?.name||d.recipient?.login||'???';return "Підписка для "+r+"! 🎀";}},
  GiftBomb:{label:"✦ GIFT BOMB ✦",emoji:"🎁",color:"#ffdd44",accent:"rgba(255,210,50,.6)",glow:"rgba(255,190,30,.45)",ring:"conic-gradient(#fd4,#fe4,#fc2,#fd4)",user:d=>xn(d)||'???',msg:d=>""+(d.gifts??d.totalGifts??'?')+" подарованих підписок! 🎁"},
  WatchStreak:{label:"🔥 WATCH STREAK 🔥",emoji:"🔥",color:"#44ffcc",accent:"rgba(50,255,180,.6)",glow:"rgba(30,230,160,.4)",ring:"conic-gradient(#4fc,#4ec,#6fc,#4fc)",user:d=>xn(d)||'???',msg:d=>""+(d.watchStreak??d.streak??'?')+" стрімів поспіль! 🔥"},
  BitsBadgeTier:{label:"💎 BITS BADGE 💎",emoji:"💎",color:"#ff66aa",accent:"rgba(255,80,160,.6)",glow:"rgba(255,60,140,.45)",ring:"conic-gradient(#f6a,#f4c,#f8b,#f6a)",user:d=>d.user?.name||d.user?.login||d.userName||d.userLogin||d.login||xn(d)||'???',msg:d=>"Новий значок бітів! 💎"+(d.threshold??d.bits??d.badgeTier??'?')+""}
};

const PT="bubbles",BT="stars",PN=18,SN=10,PS=3;
function ptcl(c){
  const b=document.getElementById('ptcl');b.innerHTML='';
  if(PT==='none')return;
  const hearts=['💜','💙','💛','❤️','🩷'];
  for(let i=0;i<PN;i++){
    const p=document.createElement('div');
    const d=(Math.random()*80-40)+'px';
    const dur=(PS*.6+Math.random()*PS*.8)+'s';
    const dl=(Math.random()*PS)+'s';
    if(PT==='bubbles'){const sz=2+Math.random()*5;p.className='p';p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c}bb;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);}
    else if(PT==='snow'){const sz=3+Math.random()*6;p.className='p-snow';p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c}cc;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);}
    else if(PT==='embers'){const sz=2+Math.random()*4;p.className='p-ember';p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c};box-shadow:0 0 4px ${c};animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);}
    else if(PT==='matrix'){p.className='p-matrix';p.style.cssText=`left:${Math.random()*95}%;color:${c};animation-duration:${dur};animation-delay:${dl};opacity:0;`;p.textContent=String.fromCharCode(0x30A0+Math.floor(Math.random()*96));}
    else if(PT==='hearts'){p.className='p-heart';p.style.cssText=`left:${Math.random()*90}%;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);p.textContent=hearts[i%hearts.length];}
    else if(PT==='bolts'){p.className='p-bolt';p.style.cssText=`left:${Math.random()*90}%;top:${Math.random()*80}%;font-size:${10+Math.random()*8}px;color:${c};text-shadow:0 0 8px ${c};animation-duration:${(.5+Math.random()*1.5)}s;animation-delay:${dl};`;p.style.setProperty('--x',(Math.random()*20-10)+'px');p.style.setProperty('--dy',(-5-Math.random()*12)+'px');p.textContent='⚡';}
    else if(PT==='rings'){const sz=4+Math.random()*8;p.className='p-ring';p.style.cssText=`left:${Math.random()*90}%;width:${sz}px;height:${sz}px;border-color:${c}99;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);}
    b.appendChild(p);
  }
}
function spk(c){
  if(BT==='none')return;
  const w=document.getElementById('wrap');
  const fe={fire:['🔥','✨','💥'],hearts:['💕','💖','💗'],emoji:['🎉','🎊','⭐','💫','✨']};
  for(let i=0;i<SN;i++){
    const el=document.createElement('div');
    const sx=(Math.random()*160-80)+'px',sy=(-30-Math.random()*80)+'px';
    const lx=50+Math.random()*400-200,ly=10+Math.random()*80;
    const dl=Math.random()*.5+'s';
    if(BT==='stars'){el.className='spark';el.style.cssText=`background:${c};left:${lx}px;top:${ly}px;animation-delay:${dl};`;el.style.setProperty('--sx',sx);el.style.setProperty('--sy',sy);}
    else if(BT==='coins'){el.className='spark-coin';el.style.cssText=`left:${lx}px;top:${ly}px;animation-delay:${dl};`;el.style.setProperty('--sx',sx);el.style.setProperty('--sy',sy);el.textContent='💰';}
    else if(BT==='confetti'){const hues=['#f55','#5af','#ff5','#5f5','#f5f','#fa5'];el.className='spark-conf';el.style.cssText=`background:${hues[i%6]};left:${lx}px;top:${ly}px;animation-delay:${dl};`;el.style.setProperty('--sx',sx);el.style.setProperty('--sy',sy);el.style.setProperty('--r',(Math.random()*360)+'deg');}
    else if(BT==='rings'){const sz=8+Math.random()*10;el.className='spark-ring';el.style.cssText=`left:${lx}px;top:${ly}px;width:${sz}px;height:${sz}px;border-color:${c};animation-delay:${Math.random()*.3}s;`;el.style.setProperty('--rs',2+Math.random()*3);}
    else if(BT==='fire'||BT==='hearts'||BT==='emoji'){const pool=fe[BT]||fe.emoji;el.className='spark-emoji';el.textContent=pool[i%pool.length];el.style.cssText=`left:${lx}px;top:${ly}px;animation-delay:${dl};`;el.style.setProperty('--sx',sx);el.style.setProperty('--sy',sy);el.style.setProperty('--r',(Math.random()*60-30)+'deg');}
    w.appendChild(el);setTimeout(()=>el.remove(),2200);
  }
}
const Q=[];let R=false;
function eq(t,d){if(!EV[t])return;Q.push({t,d});if(!R)nxt();}
function nxt(){if(!Q.length){R=false;return;}R=true;const{t,d}=Q.shift();ra(t,d);}
async function ra(t,d){
  const cfg=EV[t],w=document.getElementById('wrap');
  document.getElementById('lbl').textContent=cfg.label;
  document.getElementById('uname').textContent=cfg.user(d);
  document.getElementById('msg').textContent=cfg.msg(d);
  const u=document.getElementById('uname');u.style.color=cfg.color;
  document.getElementById('frame').style.cssText+=`;border-color:${cfg.accent};box-shadow:0 0 28px ${cfg.glow},0 0 55px ${cfg.glow.replace('.4','.18')},inset 0 0 36px rgba(0,60,120,.2);`;
  document.getElementById('ring').style.background=cfg.ring;
  [0,1,2,3].map(i=>document.getElementById('c'+i)).forEach(c=>c.style.borderColor=cfg.accent);
  const inn=document.getElementById('inner');inn.innerHTML=`<span style="font-size:38px">${cfg.emoji}</span>`;
  rav(d).then(url=>{if(url){const img=document.createElement('img');img.src=url;img.style='width:100%;height:100%;object-fit:cover;border-radius:50%;';img.onerror=()=>{inn.innerHTML=`<span style="font-size:38px">${cfg.emoji}</span>`;};inn.innerHTML='';inn.appendChild(img);}});
  w.className='';void w.offsetWidth;ptcl(cfg.color);w.classList.add('ai-'+t);spk(cfg.color);
  setTimeout(()=>{w.classList.remove('ai-'+t);void w.offsetWidth;w.classList.add('ao-'+t);setTimeout(()=>{w.className='';setTimeout(nxt,GT);},HT);},ST);
}
// WS1 — Streamer.bot (Twitch події)
function conn(){
  const EN={TwitchFollow:'Follow',TwitchRaid:'Raid',TwitchSub:'ReSub',TwitchResub:'ReSub',TwitchGiftSub:'GiftSub',TwitchGiftBomb:'GiftBomb',TwitchBitsBadgeTier:'BitsBadgeTier',TwitchWatchStreak:'WatchStreak'};
  const ws=new WebSocket(WS);
  ws.onopen=()=>ws.send(JSON.stringify({request:'Subscribe',id:'a',events:{Twitch:['*']}}));
  ws.onmessage=function(e){try{const m=JSON.parse(e.data);if(m.status||m.request||!m.event)return;const raw=m.event.type;const t=EN[raw]||raw;const args=m.data&&m.data.arguments?m.data.arguments:{};const d=Object.assign({},m.data||{},args);if(EV[t]){eq(t,d);return;}if(t==='ChatMessage'){const tx=d.text||'';const gm=tx.match(new RegExp('(.+?) '+"подарував (\\d+) підписок",'i'));if(gm){eq('GiftBomb',{userName:gm[1].trim(),gifts:parseInt(gm[2]||0)});return;}const sm=tx.match(new RegExp('(.+?) '+"має стрік із (\\d+)",'i'));if(sm){eq('WatchStreak',{userName:sm[1].trim(),watchStreak:parseInt(sm[2]||0)});return;}const bm=tx.match(new RegExp('(.+?) '+"отримав значок бітів",'i'));if(bm){eq('BitsBadgeTier',{userName:bm[1].trim()});return;}}}catch(err){}};
  ws.onclose=function(){setTimeout(conn,3000);};
  ws.onerror=function(){ws.close();};
}
// WS2 — server.js (MonoBank донати)
function conn2(){
  if(!WS2||WS2==='ws://')return;
  const ws2=new WebSocket(WS2);
  ws2.onopen=()=>ws2.send(JSON.stringify({request:'Subscribe',id:'mono',events:{}}));
  ws2.onmessage=function(e){try{const m=JSON.parse(e.data);if(!m.event)return;if(m.event.type==='MonobankDonation'){eq('Donation',m.data||{});}}catch(err){}};
  ws2.onclose=function(){setTimeout(conn2,3000);};
  ws2.onerror=function(){ws2.close();};
}
