<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"><title>Alert</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Bebas+Neue&family=Exo+2:wght@400;700;900&family=Audiowide&family=Oxanium:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* ── OBS MODE: ?obs=1 — повністю прозорий оверлей ── */
body.obs-mode {
  background: transparent !important;
  width: 700px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin: 0;
}
body.obs-mode #sitenav { display: none !important; }
body.obs-mode #page-wrap { padding-top: 0; background: none; min-height: unset; }
body.obs-mode #stage { margin: 0; }

/* ── BROWSER MODE ── */
:root { --bg: #06090f; --border: #162035; --accent: #3b82f6; --text: #dde6f0; --muted: #3d5470; --tab-h: 52px; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
}

/* ── NAV ── */
#sitenav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--tab-h);
  background: rgba(6,9,15,.98); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); display: flex; align-items: center;
  z-index: 1000; padding: 0 20px;
}
.logo-wrap { display: flex; flex-direction: column; justify-content: center; margin-right: 24px; flex-shrink: 0; }
.logo {
  font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 900;
  background: linear-gradient(130deg, #60a5fa, #22d3ee);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: 3px; line-height: 1;
}
.logo-sub { font-size: 8px; color: var(--muted); letter-spacing: 3px; margin-top: 2px; }
.divider-v { width: 1px; height: 28px; background: var(--border); margin-right: 16px; flex-shrink: 0; }
.tabs { display: flex; align-items: center; gap: 4px; height: 100%; flex: 1; }
.tab {
  display: flex; align-items: center; gap: 7px;
  padding: 0 18px; height: 36px;
  border: 1px solid transparent; border-radius: 8px;
  background: transparent; color: var(--muted);
  font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  cursor: pointer; transition: all .2s; text-decoration: none; user-select: none;
}
.tab:hover { color: var(--text); background: rgba(59,130,246,.06); border-color: rgba(59,130,246,.15); }
.tab.active { color: var(--accent); background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); box-shadow: 0 0 16px rgba(59,130,246,.15); }
.tab .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.tab.active .dot { box-shadow: 0 0 6px currentColor; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.test-bar {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
}
.test-btn {
  padding: 0 12px; height: 30px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04);
  color: var(--muted); font-family: 'Orbitron', monospace; font-size: 8px;
  letter-spacing: 1px; cursor: pointer; transition: all .2s; white-space: nowrap;
}
.test-btn:hover { color: var(--text); background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.15); }
.test-all-btn {
  padding: 0 14px; height: 30px; border-radius: 7px;
  border: 1px solid rgba(59,130,246,.35); background: rgba(59,130,246,.08);
  color: var(--accent); font-family: 'Orbitron', monospace; font-size: 8px;
  letter-spacing: 1px; cursor: pointer; transition: all .2s;
}
.test-all-btn:hover { background: rgba(59,130,246,.16); border-color: rgba(59,130,246,.6); }

/* ── PAGE WRAP ── */
#page-wrap {
  padding-top: calc(var(--tab-h) + 40px);
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,.05) 0%, transparent 60%);
}

/* ── STAGE (alert preview area) ── */
#stage {
  width: 700px; height: 200px;
  margin-bottom: 24px;
  border-radius: 16px;
  background: repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%, transparent 0% 50%) 0 0 / 16px 16px;
  border: 1px solid rgba(255,255,255,.06);
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.stage-label {
  font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,.1); user-select: none; pointer-events: none;
  position: absolute; top: 8px; left: 12px;
}

<script>
// ── OBS MODE detection ──
const isObs = new URLSearchParams(location.search).has('obs');
if (isObs) {
  document.body.classList.add('obs-mode');
  // В OBS режимі переносимо #wrap прямо в body для чистого оверлею
  document.body.style.cssText = 'background:transparent;width:700px;height:200px;display:flex;align-items:center;justify-content:center;margin:0;overflow:hidden;';
  const wrap = document.getElementById('wrap');
  document.body.appendChild(wrap);
  document.getElementById('page-wrap').remove();
  document.getElementById('sitenav').remove();
}

};
const PT="bubbles",BT="stars",PN=18,SN=10,PS=3;
function ptcl(c){const b=document.getElementById('ptcl');b.innerHTML='';if(PT==='none')return;const hearts=['💜','💙','💛','❤️','🩷'];for(let i=0;i<PN;i++){const p=document.createElement('div');const d=(Math.random()*80-40)+'px';const dur=(PS*.6+Math.random()*PS*.8)+'s';const dl=(Math.random()*PS)+'s';if(PT==='bubbles'){const sz=2+Math.random()*5;p.className='p';p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c}bb;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);}else if(PT==='snow'){const sz=3+Math.random()*6;p.className='p-snow';p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c}cc;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);}else if(PT==='hearts'){p.className='p-heart';p.style.cssText=`left:${Math.random()*90}%;animation-duration:${dur};animation-delay:${dl};`;p.style.setProperty('--d',d);p.textContent=hearts[i%hearts.length];}b.appendChild(p);}}
function spk(c){if(BT==='none')return;const w=document.getElementById('wrap');for(let i=0;i<SN;i++){const el=document.createElement('div');const sx=(Math.random()*160-80)+'px',sy=(-30-Math.random()*80)+'px';const lx=50+Math.random()*400-200,ly=10+Math.random()*80;const dl=Math.random()*.5+'s';if(BT==='stars'){el.className='spark';el.style.cssText=`background:${c};left:${lx}px;top:${ly}px;animation-delay:${dl};`;el.style.setProperty('--sx',sx);el.style.setProperty('--sy',sy);}else if(BT==='confetti'){const hues=['#f55','#5af','#ff5','#5f5','#f5f','#fa5'];el.className='spark-conf';el.style.cssText=`background:${hues[i%6]};left:${lx}px;top:${ly}px;animation-delay:${dl};`;el.style.setProperty('--sx',sx);el.style.setProperty('--sy',sy);el.style.setProperty('--r',(Math.random()*360)+'deg');}else if(BT==='rings'){const sz=8+Math.random()*10;el.className='spark-ring';el.style.cssText=`left:${lx}px;top:${ly}px;width:${sz}px;height:${sz}px;border-color:${c};animation-delay:${Math.random()*.3}s;`;el.style.setProperty('--rs',2+Math.random()*3);}w.appendChild(el);setTimeout(()=>el.remove(),2200);}}
const Q=[];let R=false;

function nxt(){if(!Q.length){R=false;return;}R=true;const{t,d}=Q.shift();ra(t,d);}

  w.className='';void w.offsetWidth;ptcl(cfg.color);w.classList.add('ai-'+t);spk(cfg.color);
  setTimeout(()=>{w.classList.remove('ai-'+t);void w.offsetWidth;w.classList.add('ao-'+t);setTimeout(()=>{w.className='';setTimeout(nxt,GT);},HT);},ST);
}
