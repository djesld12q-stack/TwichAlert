<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"><title>Alert</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Press+Start+2P&family=Bebas+Neue&family=Russo+One&family=Exo+2:wght@400;700;900&family=Audiowide&family=Righteous&family=Oxanium:wght@400;700&family=JetBrains+Mono:wght@500&family=Bangers&family=Bungee&family=Teko:wght@400;600;700&family=Chakra+Petch:wght@400;700&family=Orbitron:wght@700&family=Black+Ops+One&family=Bruno+Ace+SC&family=Tourney:wght@400;700;900&family=Squada+One&family=Barlow+Condensed:wght@400;700;900&family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;700&family=Fira+Code:wght@400;700&family=Source+Code+Pro:wght@400;700&family=DotGothic16&family=Rock+Salt&family=Pirata+One&family=Metal+Mania&family=Creepster&family=Lobster&family=Alfa+Slab+One&family=Titan+One&family=Monoton&family=Electrolize&family=Iceberg&family=Iceland&family=Gemunu+Libre:wght@400;700;800&family=Tilt+Neon&family=Rowdies:wght@400;700&family=Comfortaa:wght@700&family=Nunito:wght@800;900&family=Fredoka:wght@600;700&family=Fugaz+One&family=Patua+One&family=VT323&family=Silkscreen&family=Quantico:wght@400;700&family=Play:wght@400;700&family=Syncopate:wght@400;700&family=Michroma&family=Wallpoet&family=Bungee+Shade&family=Syne:wght@700;800&family=Anton&family=Oswald:wght@400;700&family=Philosopher:wght@400;700&family=Uncial+Antiqua&family=Lobster+Two:wght@400;700&family=Krona+One&family=Nova+Square&family=Permanent+Marker&family=Special+Elite&family=Poiret+One&display=swap" rel="stylesheet">
<style>
/* ── OBS MODE: ?obs=1 ── */
body.obs-mode {
  background: transparent !important;
  width: 700px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin: 0;
}
body.obs-mode #sitenav { display: none !important; }
body.obs-mode #page-wrap { padding-top: 0; background: none; min-height: unset; }
body.obs-mode #stage { margin: 0; }

/* ── BROWSER MODE ── */
:root { --bg: #06090f; --border: #162035; --accent: #3b82f6; --text: #dde6f0; --muted: #3d5470; --tab-h: 52px; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

/* ── NAV ── */
#sitenav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--tab-h);
  background: rgba(6,9,15,.98); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); display: flex; align-items: center;
  z-index: 1000; padding: 0 20px;
}
.logo-wrap { display: flex; flex-direction: column; justify-content: center; margin-right: 24px; flex-shrink: 0; }
.logo { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 900; background: linear-gradient(130deg, #60a5fa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; line-height: 1; }
.logo-sub { font-size: 8px; color: var(--muted); letter-spacing: 3px; margin-top: 2px; }
.divider-v { width: 1px; height: 28px; background: var(--border); margin-right: 16px; flex-shrink: 0; }
.tabs { display: flex; align-items: center; gap: 4px; height: 100%; flex: 1; }
.tab { display: flex; align-items: center; gap: 7px; padding: 0 18px; height: 36px; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--muted); font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; cursor: pointer; transition: all .2s; text-decoration: none; user-select: none; }
.tab:hover { color: var(--text); background: rgba(59,130,246,.06); border-color: rgba(59,130,246,.15); }
.tab.active { color: var(--accent); background: rgba(59,130,246,.1); border-color: rgba(59,130,246,.3); box-shadow: 0 0 16px rgba(59,130,246,.15); }
.tab .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.tab.active .dot { box-shadow: 0 0 6px currentColor; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.test-bar { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.test-btn { padding: 0 12px; height: 30px; border-radius: 7px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: var(--muted); font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 1px; cursor: pointer; transition: all .2s; white-space: nowrap; }
.test-btn:hover { color: var(--text); background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.15); }
.test-all-btn { padding: 0 14px; height: 30px; border-radius: 7px; border: 1px solid rgba(59,130,246,.35); background: rgba(59,130,246,.08); color: var(--accent); font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 1px; cursor: pointer; transition: all .2s; }
.test-all-btn:hover { background: rgba(59,130,246,.16); border-color: rgba(59,130,246,.6); }

/* ── PAGE WRAP ── */
#page-wrap { padding-top: calc(var(--tab-h) + 40px); display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,.05) 0%, transparent 60%); }

/* ── STAGE ── */
#stage { width: 700px; height: 200px; margin-bottom: 24px; border-radius: 16px; background: repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%, transparent 0% 50%) 0 0 / 16px 16px; border: 1px solid rgba(255,255,255,.06); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.stage-label { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,.1); user-select: none; pointer-events: none; position: absolute; top: 8px; left: 12px; }

/* ── ALERT WRAP — динамічний CSS підставляється з JS ── */
#wrap { position: relative; display: flex; align-items: center; opacity: 0; pointer-events: none; width: 660px; height: 158px; }

#frame { position: absolute; inset: 0; border-radius: 14px; background: linear-gradient(135deg,rgba(8,16,45,.95),rgba(5,25,60,.95),rgba(8,12,38,.95)); border: 1.5px solid rgba(100,180,255,.35); box-shadow: 0 0 28px rgba(50,120,255,.3),inset 0 0 36px rgba(0,60,120,.2); overflow: hidden; transition: border-color .3s, box-shadow .3s; }
#frame::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 18% 55%,rgba(80,150,255,.14) 0%,transparent 58%); animation: shim 3s ease-in-out infinite alternate; }
@keyframes shim { from{opacity:.6} to{opacity:1} }

/* Corners — базово bracket, перезаписується з JS */
.c { position: absolute; width: 18px; height: 18px; border-style: solid; transition: border-color .3s; }
.tl { top:6px; left:6px; border-width:2px 0 0 2px }
.tr { top:6px; right:6px; border-width:2px 2px 0 0 }
.bl { bottom:6px; left:6px; border-width:0 0 2px 2px }
.br { bottom:6px; right:6px; border-width:0 2px 2px 0 }

#ptcl { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 3; }

/* ── PARTICLE CSS — всі типи ── */
.p{position:absolute;bottom:0;width:4px;height:4px;border-radius:50%;animation:pup linear infinite;}
@keyframes pup{0%{transform:translateY(160px);opacity:0}20%{opacity:1}80%{opacity:.5}100%{transform:translateY(-16px) translateX(var(--d,0));opacity:0}}
.p-snow{position:absolute;top:-10px;border-radius:50%;animation:psnow linear infinite;}
@keyframes psnow{0%{transform:translateY(-10px) rotate(0);opacity:0}10%{opacity:.9}90%{opacity:.5}100%{transform:translateY(170px) translateX(var(--d,0px)) rotate(360deg);opacity:0}}
.p-ember{position:absolute;bottom:0;border-radius:2px;animation:pember linear infinite;}
@keyframes pember{0%{transform:translateY(0) scale(1) rotate(0);opacity:0}15%{opacity:1}85%{opacity:.6}100%{transform:translateY(-180px) translateX(var(--d,0)) scale(.2) rotate(720deg);opacity:0}}
.p-matrix{position:absolute;top:-20px;width:12px;font-size:10px;font-family:monospace;animation:pmatrix linear infinite;text-shadow:0 0 6px currentColor;}
@keyframes pmatrix{0%{transform:translateY(-20px);opacity:0}5%{opacity:.9}90%{opacity:.5}100%{transform:translateY(200px);opacity:0}}
.p-heart{position:absolute;bottom:0;font-size:12px;animation:pheart linear infinite;}
@keyframes pheart{0%{transform:translateY(0) scale(.5);opacity:0}15%{opacity:1;transform:translateY(-20px) scale(1)}90%{opacity:.4}100%{transform:translateY(-180px) translateX(var(--d,0)) scale(.3);opacity:0}}
.p-bolt{position:absolute;font-size:12px;animation:pbolt ease-in-out infinite;}
@keyframes pbolt{0%,100%{transform:translateX(var(--x,0)) translateY(0);opacity:.2}50%{opacity:1;transform:translateX(var(--x,0)) translateY(var(--dy,-8px));}}
.p-ring{position:absolute;bottom:0;border-radius:50%;border:1.5px solid;animation:pring linear infinite;background:transparent;}
@keyframes pring{0%{transform:translateY(0) scale(.5);opacity:0}15%{opacity:.9;transform:translateY(-15px) scale(1)}90%{opacity:0}100%{transform:translateY(-170px) translateX(var(--d,0)) scale(.3);opacity:0}}
.p-star{position:absolute;bottom:0;font-size:10px;animation:pstar linear infinite;}
@keyframes pstar{0%{transform:translateY(0) scale(.5) rotate(0);opacity:0}15%{opacity:1;transform:translateY(-20px) scale(1) rotate(45deg)}90%{opacity:.4}100%{transform:translateY(-180px) translateX(var(--d,0)) scale(.3) rotate(360deg);opacity:0}}
.p-coin{position:absolute;bottom:0;font-size:11px;animation:pcoin linear infinite;}
@keyframes pcoin{0%{transform:translateY(0) scale(0);opacity:0}15%{opacity:1;transform:translateY(-15px) scale(1)}90%{opacity:.4}100%{transform:translateY(-175px) translateX(var(--d,0)) scale(.4);opacity:0}}
.p-note{position:absolute;bottom:0;font-size:13px;animation:pnote ease-in-out infinite;}
@keyframes pnote{0%{transform:translateY(0) scale(.6) rotate(-15deg);opacity:0}20%{opacity:1;transform:translateY(-25px) scale(1) rotate(10deg)}85%{opacity:.5}100%{transform:translateY(-185px) translateX(var(--d,0)) scale(.3) rotate(30deg);opacity:0}}
.p-sakura{position:absolute;top:-12px;font-size:11px;animation:psakura linear infinite;}
@keyframes psakura{0%{transform:translateY(-12px) rotate(0) scale(.8);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(175px) translateX(var(--d,0)) rotate(540deg) scale(.5);opacity:0}}
.p-pixel{position:absolute;border-radius:0;animation:ppixel linear infinite;}
@keyframes ppixel{0%{transform:translateY(160px) scaleX(1);opacity:0}15%{opacity:1}85%{opacity:.6}100%{transform:translateY(-20px) translateX(var(--d,0));opacity:0}}
.p-comet{position:absolute;animation:pcomet linear infinite;}
@keyframes pcomet{0%{transform:translate(0,160px) rotate(var(--rot,-45deg));opacity:0}15%{opacity:1}90%{opacity:.4}100%{transform:translate(var(--d,0),-20px) rotate(var(--rot,-45deg));opacity:0}}
.p-fly{position:absolute;border-radius:50%;animation:pfly ease-in-out infinite;}
@keyframes pfly{0%,100%{transform:translate(0,0) scale(.6);opacity:.2}25%{transform:translate(var(--dx,8px),var(--dy,-10px)) scale(1);opacity:1}75%{transform:translate(var(--dx2,-8px),var(--dy2,8px)) scale(.8);opacity:.7}}
.p-dna{position:absolute;font-size:11px;font-family:monospace;animation:pdna linear infinite;}
@keyframes pdna{0%{transform:translateY(160px);opacity:0}15%{opacity:.9}90%{opacity:.4}100%{transform:translateY(-20px);opacity:0}}
.p-leaf{position:absolute;top:-12px;font-size:12px;animation:pleaf linear infinite;}
@keyframes pleaf{0%{transform:translateY(-12px) rotate(0) scale(.9);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(175px) translateX(var(--d,0)) rotate(var(--rot,720deg)) scale(.6);opacity:0}}
.p-rune{position:absolute;font-size:11px;font-family:monospace;animation:prune linear infinite;}
@keyframes prune{0%{transform:translateY(160px) rotateY(0);opacity:0}15%{opacity:.9}85%{opacity:.4}100%{transform:translateY(-20px) rotateY(360deg);opacity:0}}
.p-crystal{position:absolute;bottom:0;animation:pcrystal linear infinite;}
@keyframes pcrystal{0%{transform:translateY(0) scale(0) rotate(0);opacity:0}15%{opacity:1;transform:translateY(-20px) scale(1) rotate(30deg)}90%{opacity:.4}100%{transform:translateY(-175px) translateX(var(--d,0)) scale(.3) rotate(180deg);opacity:0}}
.p-tetris{position:absolute;bottom:0;border-radius:2px;animation:ptetris linear infinite;}
@keyframes ptetris{0%{transform:translateY(160px) rotate(0);opacity:0}15%{opacity:1}85%{opacity:.5}100%{transform:translateY(-20px) translateX(var(--d,0)) rotate(var(--rot,90deg));opacity:0}}
.p-spark2{position:absolute;animation:pspark2 ease-out infinite;}
@keyframes pspark2{0%{transform:translate(0,160px) scaleX(1);opacity:0}10%{opacity:1}60%{opacity:.8}100%{transform:translate(var(--d,0),-10px) scaleX(.2);opacity:0}}
.p-kata{position:absolute;top:-16px;font-size:11px;font-weight:700;animation:pkata linear infinite;}
@keyframes pkata{0%{transform:translateY(-16px);opacity:0}8%{opacity:1}88%{opacity:.6}100%{transform:translateY(190px);opacity:0}}
.p-conf2{position:absolute;animation:pconf2 linear infinite;}
@keyframes pconf2{0%{transform:translateY(-8px) rotate(0);opacity:0}8%{opacity:1}90%{opacity:.5}100%{transform:translateY(180px) translateX(var(--d,0)) rotate(var(--rot,540deg));opacity:0}}
.p-rain{position:absolute;top:0;animation:prain linear infinite;}
@keyframes prain{0%{transform:translateY(-12px) scaleY(0.6);opacity:0}5%{opacity:1}88%{opacity:.7}100%{transform:translateY(175px) scaleY(1);opacity:0}}

/* ── BURST CSS ── */
.spark{position:absolute;width:7px;height:7px;z-index:10;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:spk 1.4s ease-out forwards;}
@keyframes spk{0%{transform:scale(0) rotate(0);opacity:1}50%{transform:scale(1.6) rotate(180deg);opacity:.9}100%{transform:scale(0) rotate(360deg) translate(var(--sx,0),var(--sy,-50px));opacity:0}}
.spark-coin{position:absolute;font-size:14px;z-index:10;animation:scoins 1.3s ease-out forwards;}
@keyframes scoins{0%{transform:scale(0) translateY(0);opacity:1}60%{opacity:1}100%{transform:scale(1) translate(var(--sx,0),var(--sy,-60px));opacity:0}}
.spark-conf{position:absolute;width:7px;height:5px;z-index:10;border-radius:1px;animation:sconf 1.5s ease-out forwards;}
@keyframes sconf{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1) rotate(var(--r,180deg)) translate(var(--sx,0),var(--sy,-60px));opacity:0}}
.spark-ring{position:absolute;border-radius:50%;border:2px solid;z-index:10;animation:sring .9s ease-out forwards;}
@keyframes sring{0%{transform:scale(0);opacity:1}100%{transform:scale(var(--rs,3));opacity:0}}
.spark-emoji{position:absolute;font-size:18px;z-index:10;animation:semoji 1.6s ease-out forwards;}
@keyframes semoji{0%{transform:scale(0);opacity:1}20%{transform:scale(1.2)}100%{transform:scale(.6) translate(var(--sx,0),var(--sy,-70px)) rotate(var(--r,30deg));opacity:0}}
.spark-icon{position:absolute;font-size:20px;z-index:10;animation:sicon 1.5s ease-out forwards;}
@keyframes sicon{0%{transform:scale(0) rotate(var(--ri,0deg));opacity:1}30%{transform:scale(1.3) rotate(var(--ri,0deg));}100%{transform:scale(.4) translate(var(--sx,0),var(--sy,-80px)) rotate(var(--rf,360deg));opacity:0}}
.spark-wave{position:absolute;border-radius:50%;border:3px solid;z-index:10;animation:swave 1.1s ease-out forwards;}
@keyframes swave{0%{transform:scale(0) translate(-50%,-50%);opacity:1}100%{transform:scale(var(--rs,6)) translate(-50%,-50%);opacity:0}}
.spark-pxl{position:absolute;z-index:10;border-radius:1px;animation:spxl 1.2s ease-out forwards;}
@keyframes spxl{0%{transform:scale(0) rotate(0);opacity:1}40%{transform:scale(1) rotate(45deg);opacity:1}100%{transform:scale(.3) translate(var(--sx,0),var(--sy,-60px)) rotate(90deg);opacity:0}}
.spark-smoke{position:absolute;border-radius:50%;z-index:10;animation:ssmoke 1.8s ease-out forwards;}
@keyframes ssmoke{0%{transform:scale(0);opacity:.9}50%{opacity:.5}100%{transform:scale(var(--rs,4)) translate(var(--sx,0),var(--sy,-40px));opacity:0}}
.spark-bolt{position:absolute;font-size:20px;z-index:11;animation:sbolt .7s ease-out forwards;text-shadow:0 0 12px #fff,0 0 28px #ffe;}
@keyframes sbolt{0%{opacity:1;transform:scale(0) rotate(var(--ri,-30deg))}25%{transform:scale(1.4) rotate(var(--ri,-30deg));opacity:1}100%{transform:scale(.2) translate(var(--sx,0),var(--sy,-70px)) rotate(var(--rf,90deg));opacity:0}}

/* ── AVATAR ── */
#av { flex-shrink: 0; margin-left: 16px; z-index: 2; }
#ring { width: 100px; height: 100px; border-radius: 50%; padding: 3px; display: flex; align-items: center; justify-content: center; background: conic-gradient(#4af,#a4f,#4ff,#4af); }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes spinr { to{transform:rotate(-360deg)} }
#inner { width: 94px; height: 94px; border-radius: 50%; background: #0a1030; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 38px; }
#inner img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }

/* ── TEXT ── */
#txt { flex: 1; padding: 0 20px 0 14px; z-index: 2; }
#lbl { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: #96c8ff; margin-bottom: 4px; }
#uname { font-family: 'Cinzel Decorative', cursive; font-size: 27px; font-weight: 700; line-height: 1.1; margin-bottom: 6px; animation: uglow 2s ease-in-out infinite; }
@keyframes uglow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.45) drop-shadow(0 0 8px currentColor)} }
.is-flicker { animation: neon-flicker 3s step-end infinite !important; }
@keyframes neon-flicker{0%,18%,22%,25%,53%,57%,100%{opacity:1}19%,21%,24%,54%,56%{opacity:.4}}
#msg { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; font-style: italic; color: #fff; line-height: 1.4; text-shadow: 0 0 12px rgba(255,255,255,.8),0 2px 4px rgba(0,0,0,.9); }
</style>
</head>
<body>

<nav id="sitenav">
  <div class="logo-wrap">
    <div class="logo">TWITCHALERT</div>
    <div class="logo-sub">OVERLAY SYSTEM</div>
  </div>
  <div class="divider-v"></div>
  <div class="tabs">
    <a class="tab" href="settings.html"><span class="dot"></span>НАЛАШТУВАННЯ</a>
    <button class="tab active"><span class="dot"></span>ALERT OVERLAY</button>
  </div>
  <div class="test-bar">
    <button class="test-btn" onclick="testAlert('Donation')">Donation</button>
    <button class="test-btn" onclick="testAlert('Follow')">Follow</button>
    <button class="test-btn" onclick="testAlert('Raid')">Raid</button>
    <button class="test-btn" onclick="testAlert('ReSub')">ReSub</button>
    <button class="test-btn" onclick="testAlert('GiftSub')">GiftSub</button>
    <button class="test-btn" onclick="testAlert('GiftBomb')">GiftBomb</button>
    <button class="test-btn" onclick="testAlert('WatchStreak')">WatchStreak</button>
    <button class="test-btn" onclick="testAlert('FirstWords')">FirstWords</button>
    <button class="test-btn" onclick="testAlert('BitsBadgeTier')">BitsBadgeTier</button>
    <button class="test-all-btn" onclick="testAll()">▶ ALL</button>
  </div>
</nav>

<div id="page-wrap">
  <div id="stage">
    <div class="stage-label">PREVIEW · 700 × 200</div>
    <div id="wrap">
      <div id="frame">
        <div class="c tl" id="c0"></div><div class="c tr" id="c1"></div>
        <div class="c bl" id="c2"></div><div class="c br" id="c3"></div>
        <div id="ptcl"></div>
      </div>
      <div id="av"><div id="ring"><div id="inner">⭐</div></div></div>
      <div id="txt"><div id="lbl"></div><div id="uname"></div><div id="msg"></div></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// OBS MODE
// ══════════════════════════════════════════════════════════
const isObs = new URLSearchParams(location.search).has('obs');
if (isObs) {
  document.body.classList.add('obs-mode');
  document.body.style.cssText = 'background:transparent;width:700px;height:200px;display:flex;align-items:center;justify-content:center;margin:0;overflow:hidden;';
  document.body.appendChild(document.getElementById('wrap'));
  const pw = document.getElementById('page-wrap');
  const nav = document.getElementById('sitenav');
  if (pw) pw.remove();
  if (nav) nav.remove();
}

// ══════════════════════════════════════════════════════════
// DEFAULTS — якщо localStorage порожній
// ══════════════════════════════════════════════════════════

const STORAGE_KEY = 'alertSettings_v1';
function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    const img = localStorage.getItem(STORAGE_KEY + '_img');
    if (img) s.bgImageData = img;
    return s;
  } catch(e) { return null; }
}

const S = loadSettings() || {};

function gev(obj, ev, def) { return (S[obj] && S[obj][ev] != null) ? S[obj][ev] : (def ? def[ev] : undefined); }

function h2r(hex, a) {
  try { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${(+a).toFixed(2)})`; }
  catch { return hex; }
}

  frame.style.backgroundSize = fit === '100% 100%' ? '100% 100%' : fit === 'contain' ? 'contain' : 'cover';
  frame.style.backgroundPosition = 'center';
  frame.style.backgroundRepeat = 'no-repeat';

} else if (S.bgMode === 'image' && S.bgPresetCSS) {

// Avatar shape
function applyAvShape(sh) {
  const shapes = {
    circle:   { clip: 'circle(50% at 50% 50%)', rad: '50%' },
    rounded:  { clip: 'inset(0% round 20px)',   rad: '20px' },
    square:   { clip: 'inset(0% round 8px)',     rad: '8px' },
    hexagon:  { clip: 'polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%)', rad: '0' },
    octagon:  { clip: 'polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)', rad: '0' },
    diamond:  { clip: 'polygon(50% 0%,100% 50%,50% 100%,0% 50%)', rad: '0' },
    default:  { clip: 'circle(50% at 50% 50%)', rad: '50%' },
  };
  const s = shapes[sh] || shapes.default;
  ringEl.style.borderRadius  = s.rad;
  innerEl.style.borderRadius = s.rad;
  if (s.clip !== 'circle(50% at 50% 50%)') { ringEl.style.clipPath = s.clip; }
}
applyAvShape(avShape);

// Spin
if (avSpin) {
  ringEl.style.animation  = `spin ${avSpinSpeed}s linear ${avSpinDir} infinite`;
  innerEl.style.animation = `spinr ${avSpinSpeed}s linear ${avSpinDir==='reverse'?'normal':avSpinDir==='alternate'?'alternate':'reverse'} infinite`;
} else {
  ringEl.style.animation  = 'none';
  innerEl.style.animation = 'none';
}

// ══════════════════════════════════════════════════════════
// BORDER BOX SHADOW
// ══════════════════════════════════════════════════════════
function hexToRgbStr(hex) {
  try { return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16); }
  catch { return '100,180,255'; }
}
function hex2rgba(hex, a) { return 'rgba('+hexToRgbStr(hex)+','+a+')'; }
function getBorderBox(id, col) {
  const c=col, c2=c.replace(/[\d.]+\)$/,'.18)'), c3=c.replace(/[\d.]+\)$/,'.08)'), c5=c.replace(/[\d.]+\)$/,'.55)');
  switch(id) {
    case 'none':         return 'none';
    case 'double':       return `0 0 6px ${c5},0 0 18px ${c},0 0 40px ${c},0 0 80px ${c2},inset 0 0 30px ${c3}`;
    case 'soft':         return `0 0 12px ${c.replace(/[\d.]+\)$/,'.3)')},0 0 30px ${c2},inset 0 0 15px ${c3}`;
    case 'pulse':        return `0 0 6px ${c5},0 0 25px ${c},0 0 60px ${c.replace(/[\d.]+\)$/,'.2)')},inset 0 0 40px ${c3}`;
    case 'deep':         return `0 0 4px ${c5},0 0 12px ${c},0 0 35px ${c.replace(/[\d.]+\)$/,'.25)')},inset 0 0 50px ${c.replace(/[\d.]+\)$/,'.15)')}`;
    case 'fire_border':  return '0 0 6px rgba(255,100,0,.9),0 0 16px rgba(255,160,0,.7),0 0 35px rgba(255,60,0,.5),0 0 70px rgba(200,40,0,.3),inset 0 0 20px rgba(255,80,0,.2)';
    case 'ice_border':   return '0 0 6px rgba(180,240,255,.9),0 0 18px rgba(120,220,255,.7),0 0 40px rgba(80,200,255,.5),0 0 80px rgba(60,180,255,.2),inset 0 0 30px rgba(100,220,255,.15)';
    case 'toxic':        return '0 0 4px rgba(100,255,100,.9),0 0 14px rgba(50,255,50,.7),0 0 32px rgba(0,200,50,.5),0 0 65px rgba(0,180,30,.2),inset 0 0 25px rgba(0,255,60,.1)';
    case 'blood':        return '0 0 5px rgba(255,0,0,.9),0 0 15px rgba(200,0,0,.8),0 0 35px rgba(150,0,0,.6),0 0 60px rgba(100,0,0,.3),inset 0 0 20px rgba(180,0,0,.15)';
    case 'star':         return '0 0 4px rgba(255,240,100,.9),0 0 12px rgba(255,220,50,.8),0 0 30px rgba(255,180,0,.6),0 0 60px rgba(255,150,0,.3),inset 0 0 20px rgba(255,200,50,.1)';
    case 'plasma':       return `0 0 4px #fff,0 0 10px ${c5},0 0 25px ${c},0 0 60px ${c2},0 0 100px ${c3},inset 0 0 30px ${c3}`;
    default:             return `0 0 8px ${c5},0 0 20px ${c},0 0 45px ${c2},inset 0 0 20px ${c3}`;
  }
}

// INJECT ANIM CSS
// ══════════════════════════════════════════════════════════
function injectAnimCSS() {
  let style = document.getElementById('_adyn');
  if (!style) { style = document.createElement('style'); style.id = '_adyn'; document.head.appendChild(style); }
  const inDur  = (animInDur / 1000).toFixed(2) + 's';
  const outDur = (animOutDur / 1000).toFixed(2) + 's';
  let css = '';
  EVENTS.forEach(ev => {
    const iid = gev('animIn', ev) || DEF_ANIM_IN[ev] || 'slideLeft';
    const oid = gev('animOut', ev) || DEF_ANIM_OUT[ev] || 'slideRight';
    const inEase  = EASE_IN[iid]  || 'ease';
    const outEase = EASE_OUT[oid] || 'ease-in';
    css += `#wrap.ai-${ev}{animation:ai${ev} ${inDur} ${inEase} forwards!important;}`;
    css += `#wrap.ao-${ev}{animation:ao${ev} ${outDur} ${outEase} forwards!important;}`;
    css += `@keyframes ai${ev}{${IN_KF[iid]  || IN_KF.slideLeft}}`;
    css += `@keyframes ao${ev}{${OUT_KF[oid] || OUT_KF.slideRight}}`;
  });
  style.textContent = css;
}
injectAnimCSS();

// ══════════════════════════════════════════════════════════
// CORNERS
// ══════════════════════════════════════════════════════════
function applyCorners(col) {
  const offsets = [
    {el:'c0', top:'6px',  left:'6px'},
    {el:'c1', top:'6px',  right:'6px'},
    {el:'c2', bottom:'6px', left:'6px'},
    {el:'c3', bottom:'6px', right:'6px'},
  ];
  const bwMap = {
    0: (bw) => `${bw}px 0 0 ${bw}px`,
    1: (bw) => `${bw}px ${bw}px 0 0`,
    2: (bw) => `0 0 ${bw}px ${bw}px`,
    3: (bw) => `0 ${bw}px ${bw}px 0`,
  };
  offsets.forEach((o, i) => {
    const el = document.getElementById(o.el);
    if (!el) return;
    el.style.cssText = '';
    if (cornerStyle === 'none') { el.style.display = 'none'; return; }
    el.style.position = 'absolute';
    el.style.width    = cornSize + 'px';
    el.style.height   = cornSize + 'px';
    if (o.top)    el.style.top    = o.top;
    if (o.bottom) el.style.bottom = o.bottom;
    if (o.left)   el.style.left   = o.left;
    if (o.right)  el.style.right  = o.right;

    if (cornerStyle === 'dot' || cornerStyle === 'neon_dot') {
      const sz = Math.max(4, cornWidth * 2.5);
      el.style.width         = sz + 'px';
      el.style.height        = sz + 'px';
      el.style.background    = col;
      el.style.borderRadius  = '50%';
      el.style.border        = 'none';
      if (cornerStyle === 'neon_dot') el.style.boxShadow = `0 0 7px ${col},0 0 16px ${col}88`;
      return;
    }
    el.style.borderStyle = cornerStyle === 'double' ? 'double' : 'solid';
    el.style.borderColor = col;
    if (cornerStyle === 'round')   el.style.borderRadius = '50%';
    if (cornerStyle === 'glow')    el.style.filter = `drop-shadow(0 0 4px ${col}) drop-shadow(0 0 8px ${col})`;
    const bwMulti = cornerStyle === 'double' ? cornWidth * 3 : cornWidth;
    el.style.borderWidth = bwMap[i](bwMulti);
  });
}

function avRingGradient(ev, evColor) {
  const c1 = gs('avRingCustom1', null);
  const c2 = gs('avRingCustom2', null);
  const style = gs('avRingStyle', 'event');
  if (style === 'custom' && c1 && c2) {
    return `conic-gradient(${c1},${c2},${c1},${c2},${c1})`;
  }
  // Якщо заданий custom1/custom2 (не 'custom' стиль, але задані) — теж використовуємо
  if (c1 && c2 && style === 'event') {
    const ringStr = gev('evRing', ev) || DEF_EV_RING[ev];
    return `conic-gradient(${ringStr})`;
  }
  const ringStr = gev('evRing', ev) || DEF_EV_RING[ev];
  return `conic-gradient(${ringStr})`;
}

// BUILD EV CONFIG FROM SETTINGS
// ══════════════════════════════════════════════════════════
function buildMsgFn(ev) {
  const tpl = gev('evMsg', ev) || DEF_EV_MSGS[ev];
  switch(ev) {
    case 'Follow':       return () => tpl;
    case 'Donation':     return d => { const amt=d.monoAmount||(d.amount?d.amount+' '+(d.currency||'грн'):''); const cmt=d.monoComment||d.comment||''; return tpl.replace('{amount}',amt).replace('{comment}',cmt); };
    case 'Raid':         return d => tpl.replace('{viewers}', d.viewers ?? '?');
    case 'ReSub':        return d => tpl.replace('{months}', d.cumulativeMonths ?? d.streakMonths ?? '?');
    case 'GiftSub':      return d => tpl.replace('{recipient}', d.recipient?.name||d.recipient?.login||'???');
    case 'GiftBomb':     return d => tpl.replace('{gifts}', d.gifts ?? d.totalGifts ?? '?');
    case 'WatchStreak':  return d => tpl.replace('{streak}', d.watchStreak ?? d.streak ?? '?');
    case 'FirstWords':   return d => tpl.replace('{message}', d.message ?? '???');
    case 'BitsBadgeTier':return d => tpl.replace('{bits}', d.threshold ?? d.bits ?? d.badgeTier ?? '?');
    default:             return () => tpl;
  }
}

function buildUserFn(ev) {
  const donHide = gs('donHideName', false);
  const donCustom = gs('donCustomName', 'Анонім 💛');
  switch(ev) {
    case 'Donation':     return d => donHide ? donCustom : (d.user_name||d.userName||d.name||'Анонім');
    case 'Follow':       return d => d.user_name||d.user_login||xn(d)||'???';
    case 'Raid':         return d => d.from_broadcaster_user_name||d.from_broadcaster_user_login||xn(d)||'???';
    case 'BitsBadgeTier':return d => d.user?.name||d.user?.login||d.userName||d.userLogin||xn(d)||'???';
    default:             return d => xn(d)||'???';
  }
}

const EV = {};
EVENTS.forEach(ev => {
  // Пропускаємо вимкнені події
  if (evEnabled[ev] === false) return;
  const col   = gev('evColor',  ev) || DEF_EV_COLORS[ev];
  const acc   = gev('evAccent', ev) || DEF_EV_ACCENT[ev];
  const glow  = gev('evGlow',   ev) || DEF_EV_GLOW[ev];
  const ringStr = gev('evRing', ev) || DEF_EV_RING[ev];
  EV[ev] = {
    label:  gev('evLabel', ev) || DEF_EV_LABELS[ev],
    emoji:  gev('evEmoji', ev) != null ? gev('evEmoji', ev) : DEF_EV_EMOJIS[ev],
    color:  col,
    accent: acc,
    glow:   glow,
    ring:   `conic-gradient(${ringStr})`,

    msg:    buildMsgFn(ev),

// APPLY TEXT GLOW
// ══════════════════════════════════════════════════════════
function applyTextGlow(ev) {
  const col = (EV[ev] && EV[ev].color) || '#88ddff';
  // uname
  const unShadow = buildGlow(glowUname, glowColUname || col);
  unameEl.style.textShadow = unShadow;
  unameEl.classList.toggle('is-flicker', glowUname === 'flicker');
  // msg
  msgEl.style.textShadow = buildGlow(glowMsg, glowColMsg || msgColor);
  msgEl.classList.toggle('is-flicker', glowMsg === 'flicker');
  // lbl
  lblEl.style.textShadow = buildGlow(glowLbl, glowColLbl || lblColor);
  lblEl.classList.toggle('is-flicker', glowLbl === 'flicker');
}

// ══════════════════════════════════════════════════════════
// QUEUE + RUN ALERT
// ══════════════════════════════════════════════════════════
const Q = []; let R = false;
function eq(t, d) { if (!EV[t]) return; Q.push({t, d}); if (!R) nxt(); }
function nxt() { if (!Q.length) { R = false; return; } R = true; const {t, d} = Q.shift(); ra(t, d); }

async function ra(t, d) {
  const cfg = EV[t];
  const w   = document.getElementById('wrap');

  // Text
  lblEl.textContent   = cfg.label;
  unameEl.textContent = cfg.user(d);
  msgEl.textContent   = cfg.msg(d);
  unameEl.style.color = cfg.color;

  applyTextGlow(t);

  // Frame border
  const bPreset = borderColors[borderStyle] || cfg.color;
  const boxShadow = getBorderBox(borderStyle, hex2rgba(bPreset, .4));
  frame.style.borderColor = cfg.accent;
  frame.style.boxShadow   = boxShadow !== 'none'
    ? boxShadow
    : `0 0 28px ${cfg.glow},0 0 55px ${cfg.glow.replace(/[\d.]+\)$/,'.18)')},inset 0 0 36px rgba(0,60,120,.2)`;

  // Corners
  applyCorners(cfg.accent);

  // Ring
  if (avRingOn) {
    ringEl.style.background = avRingGradient(t, cfg.color);
    if (avGlow) ringEl.style.boxShadow = `0 0 12px ${cfg.color}88,0 0 28px ${cfg.color}44`;
  }

  // Emoji / avatar
  const innerSz = Math.round(avSize * 0.38);
  innerEl.innerHTML = `<span style="font-size:${innerSz}px">${cfg.emoji}</span>`;
  if (avOn) {
    rav(d).then(url => {
      if (url) {
        const img = document.createElement('img');
        img.src = url;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:inherit;';
        img.onerror = () => { innerEl.innerHTML = `<span style="font-size:${innerSz}px">${cfg.emoji}</span>`; };
        innerEl.innerHTML = '';
        innerEl.appendChild(img);
      }
    });
  }

  // Per-event bg override
  const bgOvrKey = 'evBgOvr_' + t;
  if (S['evBgOvr'] && S['evBgOvr'][t]) {
    const eb1 = (S.evBg1 && S.evBg1[t]) || bg1;
    const eb2 = (S.evBg2 && S.evBg2[t]) || bg2;
    const eb3 = (S.evBg3 && S.evBg3[t]) || bg3;
    frame.style.background = `linear-gradient(135deg,${h2r(eb1,bgOp)},${h2r(eb2,bgOp)},${h2r(eb3,bgOp)})`;
  }

  // Animate
  w.className = ''; void w.offsetWidth;
  ptcl(cfg.color);
  w.classList.add('ai-' + t);
  setTimeout(() => spk(cfg.color), 100);

  setTimeout(() => {
    w.classList.remove('ai-' + t); void w.offsetWidth;
    w.classList.add('ao-' + t);
    setTimeout(() => {
      w.className = '';
      setTimeout(nxt, gapTime);
    }, hideTime);
  }, showTime);
}

// WEBSOCKET
// ══════════════════════════════════════════════════════════
function conn() {
  const EN = {TwitchFollow:'Follow',TwitchRaid:'Raid',TwitchSub:'ReSub',TwitchResub:'ReSub',TwitchGiftSub:'GiftSub',TwitchGiftBomb:'GiftBomb',TwitchBitsBadgeTier:'BitsBadgeTier',TwitchWatchStreak:'WatchStreak',TwitchFirstWord:'FirstWords'};
  const ws = new WebSocket(WS);
  ws.onopen = () => ws.send(JSON.stringify({request:'Subscribe',id:'a',events:{Twitch:['*']}}));
  ws.onmessage = function(e) {
    try {
      const m = JSON.parse(e.data);
      if (m.status || m.request || !m.event) return;
      const raw = m.event.type;
      const t   = EN[raw] || raw;
      const args = m.data && m.data.arguments ? m.data.arguments : {};
      const d   = Object.assign({}, m.event.data || m.data || {}, args);
      if (EV[t]) { eq(t, d); return; }
      // Chat message regex для GiftBomb/WatchStreak/BitsBadgeTier
      if (t === 'ChatMessage') {
        const tx  = d.text || '';
        const giftRx   = gs('rx-GiftBomb', 'подарував (\\d+) підписок');
        const strkRx   = gs('rx-WatchStreak', 'має стрік із (\\d+)');
        const bitsRx   = gs('rx-BitsBadgeTier', 'отримав значок бітів');
        const gm = tx.match(new RegExp('(.+?) ' + giftRx, 'i'));
        if (gm) { eq('GiftBomb', {userName:gm[1].trim(), gifts:parseInt(gm[2]||0)}); return; }
        const sm = tx.match(new RegExp('(.+?) ' + strkRx, 'i'));
        if (sm) { eq('WatchStreak', {userName:sm[1].trim(), watchStreak:parseInt(sm[2]||0)}); return; }
        const bm = tx.match(new RegExp('(.+?) ' + bitsRx, 'i'));
        if (bm) { eq('BitsBadgeTier', {userName:bm[1].trim()}); return; }
      }
    } catch(err) {}
  };
  ws.onclose = () => setTimeout(conn, 3000);
  ws.onerror = () => ws.close();
}

function conn2() {
  if (!WS2 || WS2 === 'ws://') return;
  const ws2 = new WebSocket(WS2);
  ws2.onopen = () => ws2.send(JSON.stringify({request:'Subscribe',id:'mono',events:{}}));
  ws2.onmessage = function(e) {
    try { const m = JSON.parse(e.data); if (!m.event) return; if (m.event.type === 'MonobankDonation') eqDon(m.data||{}); } catch(err) {}
  };
  ws2.onclose = () => setTimeout(conn2, 3000);
  ws2.onerror = () => ws2.close();
}

// Дедублікація донатів
const _donSeen = new Set();
function eqDon(data) {
  const key = (data.name||'') + '_' + (data.amount||'') + '_' + Math.round((data._ts||Date.now())/2000);
  if (_donSeen.has(key)) return;
  _donSeen.add(key);
  if (_donSeen.size > 100) { const a=Array.from(_donSeen); _donSeen.clear(); a.slice(50).forEach(k=>_donSeen.add(k)); }
  eq('Donation', data);
}

// BroadcastChannel + localStorage polling
function connBC() {
  try {
    const bc = new BroadcastChannel('monobank_donations');
    bc.onmessage = function(e) {
      try { const m=e.data; if(m&&m.event&&m.event.type==='MonobankDonation'&&m.data&&!m._fromThisTab){ eqDon(m.data); } } catch(err) {}
    };
  } catch(err) {}
  let _lastTs = 0;
  setInterval(function() {
    try {
      const raw = localStorage.getItem('mono_last_donation');
      if (!raw) return;
      const m = JSON.parse(raw);
      if (m && m.data && m.data._ts && m.data._ts > _lastTs) {
        _lastTs = m.data._ts;
        if (m.event && m.event.type === 'MonobankDonation') { eqDon(m.data); }
      }
    } catch(err) {}
  }, 500);
}
